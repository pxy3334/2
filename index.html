<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>LinkPop Frenzy - 连连看 Viral HTML</title>
  <style>
    :root{
      --bg0:#080516;
      --bg1:#1b0b3a;
      --bg2:#062a4a;
      --card:rgba(255,255,255,.12);
      --card2:rgba(255,255,255,.18);
      --line:#9ffcff;
      --hot:#ff4fd8;
      --gold:#ffe86a;
      --good:#71ffb0;
      --bad:#ff5577;
      --text:#fff;
      --muted:rgba(255,255,255,.68);
      --cell:min(10.5vw,64px);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      width:100%;
      min-height:100%;
      margin:0;
      overflow:hidden;
      touch-action:manipulation;
      user-select:none;
      font-family: Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(255,79,216,.42), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(42,241,255,.38), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255,232,106,.20), transparent 34%),
        linear-gradient(145deg, var(--bg0), var(--bg1) 50%, var(--bg2));
    }

    body::before{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent 0 47%, rgba(255,255,255,.05) 49% 51%, transparent 53% 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 7px);
      opacity:.25;
      mix-blend-mode:screen;
      animation:bgSpin 13s linear infinite;
    }

    @keyframes bgSpin{
      from{ transform:rotate(0deg) scale(1.05); }
      to{ transform:rotate(360deg) scale(1.05); }
    }

    #fx{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      pointer-events:none;
      z-index:50;
    }

    #app{
      position:relative;
      z-index:2;
      min-height:100svh;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding: max(12px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      gap:10px;
    }

    .top{
      width:min(94vw,620px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:2px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      line-height:1;
      filter:drop-shadow(0 8px 20px rgba(0,0,0,.28));
    }

    .brand b{
      font-size:clamp(21px,6vw,38px);
      letter-spacing:-1.2px;
      text-transform:uppercase;
    }

    .brand span{
      margin-top:4px;
      font-size:11px;
      color:var(--muted);
      letter-spacing:1.6px;
      text-transform:uppercase;
    }

    .pill{
      border:1px solid rgba(255,255,255,.2);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      box-shadow: 0 10px 30px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.25);
      border-radius:999px;
      padding:9px 12px;
      color:white;
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      backdrop-filter:blur(18px);
    }

    .stats{
      width:min(94vw,620px);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }

    .stat{
      position:relative;
      overflow:hidden;
      min-height:56px;
      padding:9px 8px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.07));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 16px 35px rgba(0,0,0,.20);
      backdrop-filter: blur(18px);
    }

    .stat::after{
      content:"";
      position:absolute;
      inset:auto -25% -45% -25%;
      height:45px;
      background:radial-gradient(ellipse, rgba(255,255,255,.20), transparent 70%);
      transform:rotate(-8deg);
    }

    .stat label{
      display:block;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .stat strong{
      display:block;
      margin-top:4px;
      font-size:clamp(16px,4.6vw,25px);
      line-height:1;
      letter-spacing:-.5px;
      font-variant-numeric:tabular-nums;
    }

    .bars{
      width:min(94vw,620px);
      display:grid;
      gap:7px;
    }

    .bar-shell{
      position:relative;
      width:100%;
      height:14px;
      border-radius:99px;
      overflow:hidden;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:inset 0 2px 8px rgba(0,0,0,.35);
    }

    .bar-fill{
      height:100%;
      width:50%;
      border-radius:99px;
      background:linear-gradient(90deg, var(--good), #66e8ff, var(--hot));
      box-shadow:0 0 18px rgba(102,232,255,.75);
      transition:width .22s cubic-bezier(.2,.9,.2,1);
    }

    #juiceFill{
      background:linear-gradient(90deg, #8cff64, #ffe86a, #ff4fd8);
      box-shadow:0 0 18px rgba(255,232,106,.72);
    }

    .board-wrap{
      position:relative;
      width:min(94vw,560px);
      max-width:calc(100svh - 228px);
      min-width:min(94vw,300px);
      aspect-ratio:1/1;
      margin:4px auto 0;
      border-radius:30px;
      padding:10px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.17), transparent 42%);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        0 24px 70px rgba(0,0,0,.36),
        0 0 42px rgba(102,232,255,.16),
        inset 0 1px 0 rgba(255,255,255,.24);
      backdrop-filter: blur(20px);
      animation:floatBoard 3.2s ease-in-out infinite;
    }

    @keyframes floatBoard{
      0%,100%{ transform:translateY(0) rotate(-.15deg); }
      50%{ transform:translateY(-4px) rotate(.15deg); }
    }

    .board{
      width:100%;
      height:100%;
      display:grid;
      gap:7px;
      position:relative;
      z-index:5;
    }

    .tile{
      position:relative;
      display:grid;
      place-items:center;
      border:0;
      border-radius:18px;
      cursor:pointer;
      font-size:clamp(22px,7.2vw,43px);
      line-height:1;
      color:white;
      transform:translateZ(0);
      background:
        radial-gradient(circle at 34% 24%, rgba(255,255,255,.52), transparent 15%),
        linear-gradient(145deg, rgba(255,255,255,.25), rgba(255,255,255,.06));
      box-shadow:
        0 9px 0 rgba(0,0,0,.18),
        0 17px 24px rgba(0,0,0,.26),
        inset 0 1px 0 rgba(255,255,255,.34),
        inset 0 -10px 18px rgba(0,0,0,.13);
      transition:
        transform .13s cubic-bezier(.2,1.35,.25,1),
        filter .13s ease,
        opacity .18s ease,
        box-shadow .13s ease;
      will-change:transform, filter, opacity;
    }

    .tile::before{
      content:"";
      position:absolute;
      inset:2px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      pointer-events:none;
    }

    .tile::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:20px;
      background:linear-gradient(135deg, rgba(255,255,255,.0), rgba(255,255,255,.25), rgba(255,255,255,0));
      opacity:.0;
      pointer-events:none;
    }

    .tile:active{
      transform:scale(.92) translateY(4px);
      box-shadow:
        0 3px 0 rgba(0,0,0,.22),
        0 8px 14px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.34),
        inset 0 -7px 14px rgba(0,0,0,.16);
    }

    .tile.selected{
      transform:scale(1.08) translateY(-6px);
      filter:saturate(1.35) brightness(1.18);
      box-shadow:
        0 0 0 3px rgba(255,255,255,.85),
        0 0 0 7px rgba(102,232,255,.35),
        0 20px 34px rgba(0,0,0,.30),
        0 0 26px rgba(102,232,255,.85),
        inset 0 1px 0 rgba(255,255,255,.40);
      z-index:8;
    }

    .tile.hint{
      animation:hintPulse .7s ease-in-out 3;
    }

    @keyframes hintPulse{
      0%,100%{ transform:scale(1); filter:brightness(1); }
      50%{ transform:scale(1.13) translateY(-5px); filter:brightness(1.32) saturate(1.45); box-shadow:0 0 0 4px rgba(255,232,106,.7), 0 0 28px rgba(255,232,106,.85); }
    }

    .tile.good{
      animation:goodPop .34s cubic-bezier(.2,1.6,.2,1) forwards;
    }

    @keyframes goodPop{
      0%{ transform:scale(1.06); opacity:1; filter:brightness(1.3); }
      45%{ transform:scale(1.26) rotate(3deg); opacity:1; filter:brightness(1.75); }
      100%{ transform:scale(.08) rotate(-18deg); opacity:0; filter:brightness(2); }
    }

    .tile.bad{
      animation:badWiggle .24s ease-in-out;
      box-shadow:0 0 0 3px rgba(255,85,119,.75), 0 0 28px rgba(255,85,119,.7);
    }

    @keyframes badWiggle{
      0%,100%{ transform:translateX(0); }
      25%{ transform:translateX(-7px) rotate(-3deg); }
      75%{ transform:translateX(7px) rotate(3deg); }
    }

    .tile.empty{
      pointer-events:none;
      opacity:.09;
      transform:scale(.85);
      filter:blur(.4px);
      background:rgba(255,255,255,.035);
      box-shadow:inset 0 2px 10px rgba(0,0,0,.22);
    }

    .tile.empty::before,.tile.empty::after{ display:none; }

    .controls{
      width:min(94vw,620px);
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:9px;
      margin-top:2px;
    }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      min-height:48px;
      padding:10px 12px;
      color:white;
      font-weight:950;
      letter-spacing:.2px;
      background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
      box-shadow:0 10px 0 rgba(0,0,0,.18), 0 18px 30px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.28);
      backdrop-filter:blur(14px);
      cursor:pointer;
      transition:transform .11s cubic-bezier(.2,1.25,.2,1), filter .12s ease;
    }

    .btn:active{
      transform:translateY(7px) scale(.98);
      box-shadow:0 3px 0 rgba(0,0,0,.21), 0 8px 16px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.24);
      filter:brightness(1.16);
    }

    .smallprint{
      width:min(94vw,620px);
      color:rgba(255,255,255,.61);
      text-align:center;
      font-size:12px;
      line-height:1.25;
      margin-top:0;
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:100;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,79,216,.28), transparent 30%),
        rgba(5,3,16,.72);
      backdrop-filter:blur(18px);
      transition:opacity .18s ease, transform .18s ease;
    }

    .overlay.hidden{
      opacity:0;
      pointer-events:none;
      transform:scale(1.03);
    }

    .modal{
      width:min(92vw,420px);
      padding:24px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:34px;
      background:
        radial-gradient(circle at 28% 12%, rgba(255,255,255,.22), transparent 28%),
        linear-gradient(160deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      box-shadow:0 30px 90px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.24);
      text-align:center;
    }

    .modal h1{
      margin:0;
      font-size:clamp(34px,11vw,58px);
      letter-spacing:-2px;
      line-height:.9;
      text-transform:uppercase;
      text-shadow:0 4px 0 rgba(0,0,0,.18), 0 0 28px rgba(255,79,216,.45);
    }

    .modal p{
      margin:14px 0 20px;
      color:rgba(255,255,255,.75);
      font-weight:700;
      line-height:1.35;
    }

    .start{
      width:100%;
      min-height:62px;
      border:0;
      border-radius:22px;
      background:linear-gradient(90deg, #72ffb0, #61e8ff, #ff4fd8);
      color:#080516;
      font-size:18px;
      font-weight:1000;
      letter-spacing:.3px;
      box-shadow:0 12px 0 rgba(0,0,0,.25), 0 0 38px rgba(102,232,255,.45);
      cursor:pointer;
      text-transform:uppercase;
    }

    .start:active{
      transform:translateY(8px);
      box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 24px rgba(102,232,255,.35);
    }

    .float{
      position:fixed;
      z-index:90;
      pointer-events:none;
      font-weight:1000;
      letter-spacing:-.5px;
      text-shadow:0 3px 0 rgba(0,0,0,.25), 0 0 18px rgba(255,255,255,.45);
      animation:floatUp .82s cubic-bezier(.2,.95,.2,1) forwards;
      transform:translate(-50%,-50%);
      white-space:nowrap;
    }

    @keyframes floatUp{
      0%{ opacity:0; transform:translate(-50%,0) scale(.65) rotate(-6deg); }
      18%{ opacity:1; transform:translate(-50%,-18px) scale(1.1) rotate(2deg); }
      100%{ opacity:0; transform:translate(-50%,-82px) scale(1.24) rotate(-2deg); }
    }

    .toast{
      position:fixed;
      z-index:91;
      left:50%;
      bottom:calc(86px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      padding:10px 14px;
      border-radius:999px;
      background:rgba(8,5,22,.68);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 10px 30px rgba(0,0,0,.32);
      backdrop-filter:blur(14px);
      color:white;
      font-weight:900;
      font-size:13px;
      opacity:0;
      pointer-events:none;
      animation:toast .95s ease forwards;
      white-space:nowrap;
    }

    @keyframes toast{
      0%{ opacity:0; transform:translateX(-50%) translateY(18px) scale(.9); }
      18%,78%{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
      100%{ opacity:0; transform:translateX(-50%) translateY(-10px) scale(.96); }
    }

    .shake{
      animation:screenShake .26s ease-in-out;
    }

    @keyframes screenShake{
      0%,100%{ transform:translate3d(0,0,0); }
      20%{ transform:translate3d(-7px,4px,0) rotate(-.4deg); }
      40%{ transform:translate3d(8px,-4px,0) rotate(.45deg); }
      60%{ transform:translate3d(-5px,-2px,0) rotate(-.25deg); }
      80%{ transform:translate3d(4px,3px,0) rotate(.2deg); }
    }

    .fever #app{
      animation:feverHue .75s linear infinite;
    }

    .fever .board-wrap{
      box-shadow:
        0 24px 80px rgba(0,0,0,.38),
        0 0 52px rgba(255,79,216,.42),
        0 0 75px rgba(102,232,255,.28),
        inset 0 1px 0 rgba(255,255,255,.25);
    }

    @keyframes feverHue{
      0%{ filter:hue-rotate(0deg) saturate(1.1); }
      100%{ filter:hue-rotate(360deg) saturate(1.28); }
    }

    .flash{
      position:fixed;
      inset:0;
      z-index:80;
      pointer-events:none;
      background:white;
      opacity:0;
    }

    .flash.go{
      animation:flash .24s ease-out;
    }

    @keyframes flash{
      0%{ opacity:.35; }
      100%{ opacity:0; }
    }

    @media (max-width:420px){
      .stats{ gap:6px; }
      .stat{ min-height:50px; border-radius:15px; padding:8px 6px; }
      .stat label{ font-size:9px; }
      .board-wrap{ border-radius:25px; padding:8px; }
      .board{ gap:5px; }
      .tile{ border-radius:15px; }
      .controls{ gap:7px; }
      .btn{ min-height:44px; border-radius:16px; padding:8px 9px; font-size:13px; }
    }

    @media (max-height:680px){
      #app{ gap:7px; padding-top:8px; }
      .brand span{ display:none; }
      .stat{ min-height:45px; }
      .board-wrap{ width:min(92vw, calc(100svh - 218px)); }
      .smallprint{ display:none; }
      .controls .btn{ min-height:42px; }
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>

  <main id="app">
    <section class="top">
      <div class="brand">
        <b>LinkPop</b>
        <span>连连看 but overstimulated</span>
      </div>
      <div class="pill" id="highPill">BEST 0</div>
    </section>

    <section class="stats" aria-label="game stats">
      <div class="stat"><label>Score</label><strong id="score">0</strong></div>
      <div class="stat"><label>Combo</label><strong id="combo">x0</strong></div>
      <div class="stat"><label>Level</label><strong id="level">1</strong></div>
      <div class="stat"><label>Time</label><strong id="time">30</strong></div>
    </section>

    <section class="bars">
      <div class="bar-shell" title="time"><div class="bar-fill" id="timeFill"></div></div>
      <div class="bar-shell" title="juice"><div class="bar-fill" id="juiceFill"></div></div>
    </section>

    <section class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </section>

    <section class="controls">
      <button class="btn" id="hintBtn">💡 Hint</button>
      <button class="btn" id="shuffleBtn">🌀 Shuffle</button>
      <button class="btn" id="muteBtn">🔊 Audio</button>
    </section>

    <p class="smallprint">Tap matching tiles. The path must connect with ≤2 turns. Diagonals? absolutely not, bestie.</p>
  </main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h1 id="modalTitle">LinkPop Frenzy</h1>
      <p id="modalText">30 seconds. Match pairs. Watch the line. Chase combo fever. Your dopamine receptors have filed a complaint.</p>
      <button class="start" id="startBtn">Tap to Start</button>
    </div>
  </div>

  <div class="flash" id="flash"></div>

  <script>
    (() => {
      "use strict";

      const ROWS = 8;
      const COLS = 8;
      const START_TIME = 30;
      const FEVER_MS = 6500;

      const TILE_TYPES = [
        "🍓","🍋","🍇","🍉","🍒","🥝","🍑","🍍",
        "🍬","🍭","🧁","🍪","🍩","⭐","💎","🔥",
        "🌈","⚡","🛸","👑","🐸","🧃","🍄","🦄"
      ];

      const $ = (id) => document.getElementById(id);
      const board = $("board");
      const boardWrap = $("boardWrap");
      const scoreEl = $("score");
      const comboEl = $("combo");
      const levelEl = $("level");
      const timeEl = $("time");
      const timeFill = $("timeFill");
      const juiceFill = $("juiceFill");
      const highPill = $("highPill");
      const overlay = $("overlay");
      const modalTitle = $("modalTitle");
      const modalText = $("modalText");
      const startBtn = $("startBtn");
      const hintBtn = $("hintBtn");
      const shuffleBtn = $("shuffleBtn");
      const muteBtn = $("muteBtn");
      const flash = $("flash");
      const fx = $("fx");
      const ctx = fx.getContext("2d");

      const state = {
        cells: [],
        selected: null,
        score: 0,
        combo: 0,
        level: 1,
        timeLeft: START_TIME,
        maxTime: START_TIME,
        juice: 0,
        running: false,
        busy: false,
        muted: false,
        fever: false,
        feverTimer: null,
        timer: null,
        lastMatchAt: 0,
        high: Number(localStorage.getItem("linkpop_high") || 0)
      };

      let audioCtx = null;
      let master = null;
      let musicTimer = null;
      let dpr = 1;
      let particles = [];
      let activeLines = [];
      let lastFxTime = performance.now();

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function indexToRC(i) {
        return { r: Math.floor(i / COLS), c: i % COLS };
      }

      function rcToIndex(r, c) {
        return r * COLS + c;
      }

      function resizeCanvas() {
        dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
        fx.width = Math.floor(window.innerWidth * dpr);
        fx.height = Math.floor(window.innerHeight * dpr);
        fx.style.width = window.innerWidth + "px";
        fx.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function makeBoard() {
        const total = ROWS * COLS;
        const pairCount = total / 2;
        const values = [];

        for (let i = 0; i < pairCount; i++) {
          const t = TILE_TYPES[(i + state.level) % TILE_TYPES.length];
          values.push(t, t);
        }

        state.cells = shuffle(values);
        let safety = 0;
        while (!findAvailableMove() && safety < 100) {
          state.cells = shuffle(state.cells);
          safety++;
        }
        state.selected = null;
      }

      function renderBoard() {
        board.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
        board.innerHTML = "";

        state.cells.forEach((value, i) => {
          const btn = document.createElement("button");
          btn.className = "tile" + (value ? "" : " empty") + (state.selected === i ? " selected" : "");
          btn.type = "button";
          btn.dataset.index = String(i);
          btn.textContent = value || "";
          btn.setAttribute("aria-label", value ? `tile ${value}` : "empty");
          btn.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            handleTile(i);
          }, { passive: false });
          board.appendChild(btn);
        });
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(state.score).toLocaleString();
        comboEl.textContent = "x" + state.combo;
        levelEl.textContent = state.level;
        timeEl.textContent = Math.max(0, Math.ceil(state.timeLeft));
        highPill.textContent = "BEST " + state.high.toLocaleString();

        const timePct = Math.max(0, Math.min(100, (state.timeLeft / state.maxTime) * 100));
        timeFill.style.width = timePct + "%";
        juiceFill.style.width = Math.max(0, Math.min(100, state.juice)) + "%";

        timeEl.style.color = state.timeLeft <= 5 ? "var(--bad)" : "white";
      }

      function startGame() {
        initAudio();
        state.score = 0;
        state.combo = 0;
        state.level = 1;
        state.timeLeft = START_TIME;
        state.maxTime = START_TIME;
        state.juice = 0;
        state.running = true;
        state.busy = false;
        state.fever = false;
        document.body.classList.remove("fever");
        clearTimeout(state.feverTimer);
        makeBoard();
        renderBoard();
        updateHud();
        overlay.classList.add("hidden");
        toast("GO. TAP. CONNECT. PANIC.");
        sfx("start");

        clearInterval(state.timer);
        state.timer = setInterval(() => {
          if (!state.running) return;
          state.timeLeft -= 1;

          if (state.timeLeft <= 5 && state.timeLeft > 0) sfx("tick");
          if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            updateHud();
            gameOver();
            return;
          }
          updateHud();
        }, 1000);
      }

      function gameOver() {
        state.running = false;
        state.busy = false;
        clearInterval(state.timer);
        sfx("gameover");
        shakeScreen();
        flashScreen();

        if (state.score > state.high) {
          state.high = Math.floor(state.score);
          localStorage.setItem("linkpop_high", String(state.high));
          modalTitle.textContent = "New Best 💅";
        } else {
          modalTitle.textContent = "Time Up";
        }

        modalText.textContent = `Score ${Math.floor(state.score).toLocaleString()} · Level ${state.level}. The tiles won this round. Embarrassing, honestly.`;
        startBtn.textContent = "Run It Back";
        updateHud();
        setTimeout(() => overlay.classList.remove("hidden"), 420);
      }

      function handleTile(i) {
        if (!state.running || state.busy) return;
        const value = state.cells[i];
        if (!value) return;

        initAudio();

        if (state.selected === null) {
          state.selected = i;
          renderBoard();
          sfx("tap");
          popAtTile(i, "LOCK");
          return;
        }

        if (state.selected === i) {
          state.selected = null;
          renderBoard();
          sfx("tap");
          return;
        }

        const a = state.selected;
        const b = i;
        const same = state.cells[a] === state.cells[b];

        if (same) {
          const path = findPath(indexToRC(a), indexToRC(b));
          if (path) {
            doMatch(a, b, path);
            return;
          }
        }

        wrongMove(a, b);
      }

      function doMatch(a, b, path) {
        state.busy = true;

        const now = performance.now();
        state.combo = now - state.lastMatchAt < 1800 ? state.combo + 1 : 1;
        state.lastMatchAt = now;

        const multiplier = state.fever ? 2 : 1;
        const gained = Math.floor((100 + state.combo * 35 + state.level * 15) * multiplier);
        state.score += gained;
        state.juice = Math.min(100, state.juice + 9 + Math.min(18, state.combo * 2));

        if (state.combo >= 4) state.timeLeft = Math.min(state.maxTime, state.timeLeft + 1.2);
        if (state.juice >= 100 && !state.fever) activateFever();

        showLine(path, state.fever ? "fever" : "match");
        markTile(a, "good");
        markTile(b, "good");

        const ca = tileCenter(a);
        const cb = tileCenter(b);
        burst(ca.x, ca.y, state.cells[a], 18 + Math.min(18, state.combo * 2));
        burst(cb.x, cb.y, state.cells[b], 18 + Math.min(18, state.combo * 2));
        floatText("+" + gained + (multiplier > 1 ? " FEVER" : ""), (ca.x + cb.x) / 2, (ca.y + cb.y) / 2, state.combo);
        popAtTile(b, state.combo >= 3 ? `x${state.combo}` : "POP");

        sfx(state.combo >= 6 ? "mega" : state.combo >= 3 ? "combo" : "match");

        if (state.combo >= 5) {
          shakeScreen();
          flashScreen();
        }

        updateHud();

        setTimeout(() => {
          state.cells[a] = null;
          state.cells[b] = null;
          state.selected = null;
          renderBoard();
          updateHud();

          if (state.cells.every(v => v === null)) {
            levelClear();
          } else {
            ensureMove();
          }

          state.busy = false;
        }, 230);
      }

      function wrongMove(a, b) {
        state.combo = 0;
        state.juice = Math.max(0, state.juice - 8);
        state.selected = null;
        markTile(a, "bad");
        markTile(b, "bad");
        shakeScreen();
        sfx("bad");
        updateHud();

        setTimeout(() => renderBoard(), 220);
      }

      function levelClear() {
        state.running = true;
        state.level += 1;
        state.maxTime = Math.min(45, START_TIME + state.level * 2);
        state.timeLeft = Math.min(state.maxTime, state.timeLeft + 8);
        state.score += 500 + state.level * 100;
        state.combo += 1;

        toast("LEVEL CLEAR — BOARD DELETED 💀");
        sfx("clear");
        confetti();

        setTimeout(() => {
          makeBoard();
          renderBoard();
          updateHud();
        }, 520);
      }

      function activateFever() {
        state.fever = true;
        state.juice = 0;
        document.body.classList.add("fever");
        toast("FEVER MODE: +2x SCORE. ABSOLUTE NONSENSE.");
        sfx("fever");
        flashScreen();

        clearTimeout(state.feverTimer);
        state.feverTimer = setTimeout(() => {
          state.fever = false;
          document.body.classList.remove("fever");
        }, FEVER_MS);
      }

      function ensureMove() {
        if (state.cells.every(v => v === null)) return;
        if (findAvailableMove()) return;
        shuffleRemaining(false);
        toast("NO MOVES — CHAOS SHUFFLE");
      }

      function shuffleRemaining(manual = true) {
        if (!state.running || state.busy) return;

        const occupiedIndexes = [];
        const values = [];
        state.cells.forEach((v, i) => {
          if (v) {
            occupiedIndexes.push(i);
            values.push(v);
          }
        });

        let attempt = 0;
        do {
          shuffle(values);
          occupiedIndexes.forEach((idx, n) => state.cells[idx] = values[n]);
          attempt++;
        } while (!findAvailableMove() && attempt < 250);

        state.selected = null;
        renderBoard();
        updateHud();

        const rect = boardWrap.getBoundingClientRect();
        for (let k = 0; k < 44; k++) {
          burst(
            rect.left + Math.random() * rect.width,
            rect.top + Math.random() * rect.height,
            "🌀",
            1,
            true
          );
        }

        if (manual) {
          state.combo = 0;
          state.juice = Math.max(0, state.juice - 12);
          toast("SHUFFLED. RNG GOBLIN APPROVES.");
          sfx("shuffle");
          updateHud();
        }
      }

      function showHint() {
        if (!state.running || state.busy) return;
        const move = findAvailableMove();
        if (!move) {
          ensureMove();
          return;
        }

        state.combo = 0;
        state.juice = Math.max(0, state.juice - 5);
        state.selected = null;
        renderBoard();

        markTile(move.a, "hint");
        markTile(move.b, "hint");
        showLine(move.path, "hint");
        sfx("hint");
        toast("THE GAME WHISPERED. USE IT.");
        updateHud();
      }

      function markTile(i, cls) {
        const el = board.querySelector(`[data-index="${i}"]`);
        if (el) {
          el.classList.remove(cls);
          void el.offsetWidth;
          el.classList.add(cls);
        }
      }

      function tileCenter(i) {
        const el = board.querySelector(`[data-index="${i}"]`);
        if (!el) return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const r = el.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      function marginPointToScreen(point) {
        const [mr, mc] = point;
        const rect = board.getBoundingClientRect();
        const cellW = rect.width / COLS;
        const cellH = rect.height / ROWS;

        return {
          x: rect.left + (mc - 1 + 0.5) * cellW,
          y: rect.top + (mr - 1 + 0.5) * cellH
        };
      }

      function findPath(a, b) {
        const gridRows = ROWS + 2;
        const gridCols = COLS + 2;
        const start = { r: a.r + 1, c: a.c + 1 };
        const target = { r: b.r + 1, c: b.c + 1 };
        const dirs = [
          [-1, 0],
          [0, 1],
          [1, 0],
          [0, -1]
        ];

        const visited = Array.from({ length: gridRows }, () =>
          Array.from({ length: gridCols }, () => [Infinity, Infinity, Infinity, Infinity])
        );

        function blocked(r, c) {
          if (r === start.r && c === start.c) return false;
          if (r === target.r && c === target.c) return false;
          const br = r - 1;
          const bc = c - 1;
          if (br < 0 || br >= ROWS || bc < 0 || bc >= COLS) return false;
          return state.cells[rcToIndex(br, bc)] !== null;
        }

        const queue = [{ r: start.r, c: start.c, dir: -1, turns: -1, path: [[start.r, start.c]] }];
        let head = 0;

        while (head < queue.length) {
          const cur = queue[head++];

          for (let d = 0; d < dirs.length; d++) {
            const nr = cur.r + dirs[d][0];
            const nc = cur.c + dirs[d][1];

            if (nr < 0 || nr >= gridRows || nc < 0 || nc >= gridCols) continue;

            const nextTurns = cur.dir === -1 ? 0 : (cur.dir === d ? cur.turns : cur.turns + 1);
            if (nextTurns > 2) continue;
            if (blocked(nr, nc)) continue;
            if (visited[nr][nc][d] <= nextTurns) continue;

            visited[nr][nc][d] = nextTurns;
            const nextPath = cur.path.concat([[nr, nc]]);

            if (nr === target.r && nc === target.c) {
              return simplifyPath(nextPath);
            }

            queue.push({ r: nr, c: nc, dir: d, turns: nextTurns, path: nextPath });
          }
        }

        return null;
      }

      function simplifyPath(path) {
        if (path.length <= 2) return path;

        const out = [path[0]];
        let prev = direction(path[0], path[1]);

        for (let i = 1; i < path.length - 1; i++) {
          const next = direction(path[i], path[i + 1]);
          if (next !== prev) {
            out.push(path[i]);
            prev = next;
          }
        }

        out.push(path[path.length - 1]);
        return out;
      }

      function direction(a, b) {
        if (a[0] === b[0]) return "h";
        if (a[1] === b[1]) return "v";
        return "x";
      }

      function findAvailableMove() {
        for (let i = 0; i < state.cells.length; i++) {
          if (!state.cells[i]) continue;
          for (let j = i + 1; j < state.cells.length; j++) {
            if (state.cells[i] !== state.cells[j]) continue;
            const path = findPath(indexToRC(i), indexToRC(j));
            if (path) return { a: i, b: j, path };
          }
        }
        return null;
      }

      function showLine(path, kind = "match") {
        const pts = path.map(marginPointToScreen);
        activeLines.push({
          pts,
          kind,
          born: performance.now(),
          duration: kind === "hint" ? 900 : 430,
          wobble: Math.random() * Math.PI * 2
        });
      }

      function drawActiveLines(now) {
        activeLines = activeLines.filter(line => now - line.born < line.duration);

        for (const line of activeLines) {
          const age = (now - line.born) / line.duration;
          const alpha = Math.sin(Math.PI * Math.min(1, age));
          const color = line.kind === "hint" ? "rgba(255,232,106," : line.kind === "fever" ? "rgba(255,79,216," : "rgba(116,246,255,";

          ctx.save();
          ctx.globalAlpha = Math.max(0, alpha);
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.shadowBlur = line.kind === "hint" ? 18 : 26;
          ctx.shadowColor = line.kind === "fever" ? "#ff4fd8" : line.kind === "hint" ? "#ffe86a" : "#74f6ff";

          ctx.beginPath();
          line.pts.forEach((p, i) => {
            const wobble = Math.sin(now / 40 + i + line.wobble) * (line.kind === "hint" ? 0 : 1.8);
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x + wobble, p.y - wobble);
          });

          ctx.lineWidth = line.kind === "hint" ? 9 : 12;
          ctx.strokeStyle = color + ".18)";
          ctx.stroke();

          ctx.setLineDash([18, 12]);
          ctx.lineDashOffset = -age * 90;
          ctx.lineWidth = line.kind === "hint" ? 4 : 6;
          ctx.strokeStyle = color + ".95)";
          ctx.stroke();

          ctx.setLineDash([]);
          drawTravelOrb(line, age);
          ctx.restore();
        }
      }

      function drawTravelOrb(line, age) {
        if (!line.pts.length) return;
        const p = pointOnPolyline(line.pts, Math.min(1, Math.max(0, age)));
        ctx.save();
        ctx.shadowBlur = 22;
        ctx.shadowColor = "#fff";
        ctx.fillStyle = line.kind === "fever" ? "#ff4fd8" : line.kind === "hint" ? "#ffe86a" : "#9ffcff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, line.kind === "hint" ? 5 : 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function pointOnPolyline(pts, t) {
        if (pts.length === 1) return pts[0];

        let total = 0;
        const lens = [];
        for (let i = 1; i < pts.length; i++) {
          const l = Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
          lens.push(l);
          total += l;
        }

        let dist = total * t;
        for (let i = 1; i < pts.length; i++) {
          if (dist <= lens[i - 1]) {
            const a = pts[i - 1];
            const b = pts[i];
            const n = lens[i - 1] ? dist / lens[i - 1] : 0;
            return { x: a.x + (b.x - a.x) * n, y: a.y + (b.y - a.y) * n };
          }
          dist -= lens[i - 1];
        }

        return pts[pts.length - 1];
      }

      function burst(x, y, emoji = "✦", amount = 16, soft = false) {
        const count = Math.max(1, Math.floor(amount));
        const chars = [emoji, "✦", "✧", "•", "★", "💥"];

        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = soft ? 60 + Math.random() * 90 : 120 + Math.random() * 220;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (soft ? 30 : 70),
            g: soft ? 180 : 320,
            life: soft ? .55 + Math.random() * .45 : .45 + Math.random() * .48,
            age: 0,
            size: soft ? 13 + Math.random() * 16 : 16 + Math.random() * 24,
            spin: (Math.random() - .5) * 10,
            rot: Math.random() * Math.PI,
            char: chars[Math.floor(Math.random() * chars.length)],
            color: ["#9ffcff", "#ff4fd8", "#ffe86a", "#71ffb0", "#ffffff"][Math.floor(Math.random() * 5)]
          });
        }
      }

      function confetti() {
        const rect = boardWrap.getBoundingClientRect();
        for (let i = 0; i < 140; i++) {
          burst(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height, TILE_TYPES[i % TILE_TYPES.length], 1, true);
        }
        flashScreen();
        shakeScreen();
      }

      function drawParticles(dt) {
        particles = particles.filter(p => p.age < p.life);

        for (const p of particles) {
          p.age += dt;
          p.vy += p.g * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rot += p.spin * dt;

          const t = Math.min(1, p.age / p.life);
          ctx.save();
          ctx.globalAlpha = Math.max(0, 1 - t);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.font = `${p.size * (1 - t * .25)}px system-ui, Apple Color Emoji, Segoe UI Emoji`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowBlur = 18;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.fillText(p.char, 0, 0);
          ctx.restore();
        }
      }

      function fxLoop(now) {
        const dt = Math.min(.035, (now - lastFxTime) / 1000);
        lastFxTime = now;

        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        drawActiveLines(now);
        drawParticles(dt);

        requestAnimationFrame(fxLoop);
      }

      function floatText(text, x, y, combo = 1) {
        const el = document.createElement("div");
        el.className = "float";
        el.textContent = text;
        el.style.left = x + "px";
        el.style.top = y + "px";
        el.style.fontSize = Math.min(38, 18 + combo * 2.2) + "px";
        el.style.color = combo >= 6 ? "var(--hot)" : combo >= 3 ? "var(--gold)" : "#fff";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      function popAtTile(i, text) {
        const c = tileCenter(i);
        floatText(text, c.x, c.y - 10, Math.max(1, state.combo));
      }

      function toast(message) {
        const old = document.querySelector(".toast");
        if (old) old.remove();

        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1050);
      }

      function shakeScreen() {
        const app = $("app");
        app.classList.remove("shake");
        void app.offsetWidth;
        app.classList.add("shake");
        setTimeout(() => app.classList.remove("shake"), 280);
      }

      function flashScreen() {
        flash.classList.remove("go");
        void flash.offsetWidth;
        flash.classList.add("go");
      }

      function initAudio() {
        if (state.muted) return;

        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;

        if (!audioCtx) {
          audioCtx = new AC();
          master = audioCtx.createGain();
          master.gain.value = 0.18;
          master.connect(audioCtx.destination);
          startMusic();
        }

        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function tone(freq, dur = .08, type = "sine", gain = .08, delay = 0) {
        if (state.muted || !audioCtx || !master) return;

        const t = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(Math.max(30, freq * .65), t + dur);

        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + .01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);

        osc.connect(g);
        g.connect(master);
        osc.start(t);
        osc.stop(t + dur + .03);
      }

      function noise(dur = .08, gain = .06) {
        if (state.muted || !audioCtx || !master) return;

        const length = Math.floor(audioCtx.sampleRate * dur);
        const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < length; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / length);
        }

        const source = audioCtx.createBufferSource();
        const g = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        filter.type = "highpass";
        filter.frequency.value = 900;
        g.gain.value = gain;

        source.buffer = buffer;
        source.connect(filter);
        filter.connect(g);
        g.connect(master);
        source.start();
      }

      function sfx(name) {
        if (state.muted) return;

        switch (name) {
          case "tap":
            tone(520, .045, "triangle", .045);
            break;
          case "match":
            tone(620, .08, "sine", .07);
            tone(930, .10, "triangle", .05, .035);
            noise(.045, .018);
            break;
          case "combo":
            tone(660, .07, "triangle", .07);
            tone(990, .08, "triangle", .06, .04);
            tone(1320, .10, "sine", .05, .08);
            noise(.06, .025);
            break;
          case "mega":
            tone(440, .08, "square", .045);
            tone(880, .10, "triangle", .08, .035);
            tone(1320, .10, "sine", .07, .075);
            tone(1760, .12, "triangle", .06, .12);
            noise(.09, .04);
            break;
          case "bad":
            tone(180, .12, "sawtooth", .05);
            tone(120, .15, "sawtooth", .035, .04);
            break;
          case "shuffle":
            for (let i = 0; i < 7; i++) tone(260 + i * 70, .04, "triangle", .035, i * .025);
            noise(.10, .045);
            break;
          case "hint":
            tone(740, .06, "sine", .04);
            tone(1110, .09, "sine", .035, .05);
            break;
          case "clear":
            for (let i = 0; i < 8; i++) tone(520 * Math.pow(1.122, i), .08, "triangle", .052, i * .035);
            noise(.20, .06);
            break;
          case "fever":
            for (let i = 0; i < 12; i++) tone(220 + i * 90, .055, i % 2 ? "square" : "triangle", .04, i * .025);
            noise(.16, .07);
            break;
          case "tick":
            tone(880, .04, "square", .025);
            break;
          case "start":
            tone(330, .08, "triangle", .05);
            tone(660, .10, "triangle", .05, .06);
            tone(990, .12, "sine", .04, .12);
            break;
          case "gameover":
            tone(330, .16, "sawtooth", .045);
            tone(220, .20, "sawtooth", .035, .13);
            tone(140, .24, "sawtooth", .025, .27);
            break;
        }
      }

      function startMusic() {
        if (musicTimer) return;
        let step = 0;

        musicTimer = setInterval(() => {
          if (state.muted || !state.running || !audioCtx) return;

          const base = state.fever ? 110 : 82;
          if (step % 2 === 0) tone(base, .045, "sine", .018);
          if (step % 4 === 1) tone(state.fever ? 660 : 520, .035, "triangle", .015);
          if (step % 8 === 7) noise(.035, .010);

          step++;
        }, 190);
      }

      startBtn.addEventListener("click", startGame);
      hintBtn.addEventListener("click", showHint);
      shuffleBtn.addEventListener("click", () => shuffleRemaining(true));
      muteBtn.addEventListener("click", () => {
        state.muted = !state.muted;
        muteBtn.textContent = state.muted ? "🔇 Muted" : "🔊 Audio";
        if (!state.muted) {
          initAudio();
          sfx("tap");
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && audioCtx && audioCtx.state === "running") audioCtx.suspend();
        if (!document.hidden && audioCtx && !state.muted) audioCtx.resume();
      });

      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      renderBoard();
      updateHud();
      requestAnimationFrame(fxLoop);
    })();
  </script>
</body>
</html>
